<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawSight Telemetry</title>
    <style>
        :root {
            --bg-color: rgba(20, 20, 25, 0.9);
            --text-color: #e0e0e0;
            --accent-color: #00ffcc;
            --danger-color: #ff4d4d;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: transparent;
            color: var(--text-color);
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
            border-radius: 12px;
            border: 1px solid #444;
        }
        #header {
            padding: 10px;
            background: rgba(40, 40, 50, 0.95);
            display: flex;
            justify-content: space-between;
            align-items: center;
            -webkit-app-region: drag;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: var(--accent-color);
            display: inline-block;
            margin-right: 5px;
        }
        #content {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            background: var(--bg-color);
        }
        .metric-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .log-stream {
            font-family: 'Courier New', Courier, monospace;
            font-size: 12px;
            color: #aaa;
            max-height: 200px;
            overflow-y: hidden;
            border-left: 2px solid var(--accent-color);
            padding-left: 10px;
        }
        .toggle-section {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
            cursor: pointer;
            color: var(--accent-color);
        }
    </style>
</head>
<body>
    <div id="header">
        <div><span class="status-dot"></span> <b>ClawSight v1.0</b></div>
        <div style="font-size: 12px;">Token: <span id="token-count">0</span></div>
    </div>
    <div id="content">
        <div class="metric-card">
            <div style="font-size: 11px; opacity: 0.6;">Current Task</div>
            <div id="current-task" style="font-size: 16px; margin-top: 5px;">Awaiting Data...</div>
        </div>
        
        <div class="toggle-section" onclick="toggle('thought-log')">Thought Log [+]</div>
        <div id="thought-log" class="log-stream">
            Searching for OpenClaw local instance...<br>
            Establishing file watch on workspace logs...
        </div>

        <div class="toggle-section" onclick="toggle('pipeline-viz')">Pipeline Viz [+]</div>
        <div id="pipeline-viz" style="display:none; height: 100px; border: 1px dashed #444; margin-top: 5px; display: flex; align-items: center; justify-content: center; font-size: 11px;">
            [ Flowchart Rendering Soon ]
        </div>
    </div>
    <script>
        function toggle(id) {
            const el = document.getElementById(id);
            el.style.display = el.style.display === 'none' ? 'block' : 'none';
        }
        // Discovery Logic Placeholder
        console.log("ClawSight initialized. Scanning for OpenClaw session files...");
    </script>
</body>
</html>
