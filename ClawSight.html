<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClawSight Telemetry v1.1</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1e1e22;
            --text-main: #e0e0e0;
            --text-dim: #909090;
            --accent: #00ffcc;
            --danger: #ff4d4d;
            --warning: #ffcc00;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        #header {
            padding: 12px 20px;
            background: #1a1a1d;
            border-bottom: 1px solid #333;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-badge {
            display: flex;
            align-items: center;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 10px var(--accent);
        }
        #main-container {
            flex: 1;
            padding: 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 20px;
            overflow: hidden;
        }
        .panel {
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid #333;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 10px 15px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid #333;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
            color: var(--text-dim);
            display: flex;
            justify-content: space-between;
        }
        #log-container {
            flex: 1;
            padding: 15px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 13px;
            overflow-y: auto;
            line-height: 1.6;
        }
        .log-entry { margin-bottom: 8px; border-left: 2px solid #444; padding-left: 10px; }
        .log-thought { color: var(--accent); }
        .log-action { color: #88ccff; font-style: italic; }
        
        .metric-row {
            padding: 15px;
            border-bottom: 1px solid #333;
        }
        .metric-value { font-size: 24px; font-weight: bold; color: var(--accent); }
        .metric-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }

        #drop-zone {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--accent);
            color: #000;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.2s;
        }
        #drop-zone:hover { transform: scale(1.05); }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div id="header">
        <div class="status-badge"><div class="dot"></div> CLAWSIGHT v1.1 <span style="margin-left:10px; font-size:10px; opacity:0.5;">ENGINE ACTIVE</span></div>
        <div style="display:flex; gap: 20px;">
            <div id="status-lamp" style="color: var(--accent);">● STANDBY</div>
        </div>
    </div>

    <div id="main-container">
        <div class="panel">
            <div class="panel-header">
                <span>Real-time Thought Stream</span>
                <span id="file-name" style="font-weight:normal; text-transform:none;">No file mounted</span>
            </div>
            <div id="log-container">
                <div style="color:var(--text-dim)">Waiting for log data... Please use the "Mount Log" button if auto-discovery is blocked by browser security.</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">Vital Metrics</div>
            <div class="metric-row">
                <div class="metric-value" id="token-display">0</div>
                <div class="metric-label">Session Tokens</div>
            </div>
            <div class="metric-row">
                <div class="metric-value" id="task-progress">0%</div>
                <div class="metric-label">Workflow Progress</div>
            </div>
            <div class="metric-row">
                <div id="build-status" style="color: var(--accent); font-weight:bold;">READY</div>
                <div class="metric-label">Environment Status</div>
            </div>
        </div>
    </div>

    <label id="drop-zone" for="file-input">⚡ MOUNT OPENCLAW LOG (.jsonl)</label>
    <input type="file" id="file-input" accept=".jsonl">

    <script>
        const logContainer = document.getElementById('log-container');
        const fileInput = document.getElementById('file-input');
        const fileNameDisplay = document.getElementById('file-name');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            fileNameDisplay.innerText = file.name;
            startPolling(file);
        });

        function startPolling(file) {
            logContainer.innerHTML = '<div style="color:var(--accent)">Connection established. Parsing stream...</div>';
            const reader = new FileReader();
            
            setInterval(() => {
                // In a real standalone app, this would use a local File System API
                // For a browser-run HTML, we re-read the blob to simulate live tailing
                reader.onload = function(e) {
                    const lines = e.target.result.split('\n').filter(l => l.trim());
                    renderLogs(lines.slice(-20)); // Show last 20 events
                };
                reader.readAsText(file);
            }, 2000);
        }

        function renderLogs(lines) {
            logContainer.innerHTML = '';
            lines.forEach(line => {
                try {
                    const data = JSON.parse(line);
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    
                    if (data.thought) {
                        entry.innerHTML = `<span class="log-thought">[THOUGHT]</span> ${data.thought}`;
                    } else if (data.tool_call) {
                        entry.innerHTML = `<span class="log-action">[ACTION]</span> Invoking ${data.tool_call.name}`;
                    } else {
                        entry.innerHTML = `<span style="opacity:0.5">[SYSTEM]</span> Message Received`;
                    }
                    logContainer.appendChild(entry);
                } catch(e) {}
            });
            logContainer.scrollTop = logContainer.scrollHeight;
        }
    </script>
</body>
</html>
